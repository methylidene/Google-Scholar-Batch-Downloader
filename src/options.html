<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Google Scholar 批量下载器设置</title>
  <style>
    body { max-width: 42rem; margin: 2rem auto; padding: 0 1rem; color: #202124; font: 16px/1.6 system-ui, sans-serif; }
    label { display: block; margin: 1rem 0; }
    input[type="number"] { width: 8rem; margin-left: .5rem; padding: .35rem; }
    .note { color: #5f6368; font-size: .9rem; }
    button { padding: .45rem 1.2rem; }
    #status { min-height: 1.6em; }
  </style>
</head>
<body>
  <main>
    <h1>扩展设置</h1>
    <label>PDF 下载启动间隔（毫秒）
      <input id="download-delay" type="number" min="300" max="5000" step="1" required>
    </label>
    <p class="note">允许范围 300–5000，默认 800。适当增大间隔可减少连续请求。</p>
    <label><input id="enable-arxiv" type="checkbox"> Scholar 下载失败后启用 arXiv 备用源</label>
    <p class="note">默认开启。扩展只为未找到 PDF 或明确下载失败的论文串行查询 arXiv；严格匹配 DOI 或标题，API 请求间隔至少 3 秒。</p>
    <button id="save" type="button">保存</button>
    <p id="status" role="status" aria-live="polite"></p>
  </main>
  <script type="module" src="options.js"></script>
</body>
</html>
